<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PonteDourada</title>
    <link rel="stylesheet" href="CSS/projetoteste.css">
    
</head>

<body>
    <div class="loginContainer">
        <header class="top-bar">
            <header class="top-bar">
                <a href="javascript:void(0)" onclick="window.history.back();" class="btn-back">
                    <img src="img/setaretorno.jpeg" alt="Voltar">
                </a>
                <span class="sector-info">🏠<BR> <strong>CADASTRO DE PROFISSIONAIS</strong></span>
            </header>
            <div class="logo">
                <img src="img/2.jpeg" alt="">
            </div>
            <div class="configTipoProfissional">
                Tipo de Profissional : <br>
                <input type="text" id="tipoProfissional" placeholder="Ex: MÉDICO, ENFERMEIRO...">
            </div><br>
            <div class="configConselhoRegistro">
                Conselho Registro : <br>
                <input type="text" id="conselhoRegistro" placeholder="Ex: CRM/RJ, COREN...">
            </div><br>
            <div class="configCpfProfissional">
    CPF : <br>
    <input type="text" id="cpfProfissional" placeholder="000.000.000-00" maxlength="14">
</div><br>
            <button type="submit" id="btnLogar" onclick="profissionalizar()">CADASTRAR</button>
            <div id="btnCadastrar" style="display:none;">
                <h2 id="mensagemProfissionalCadastro"></h2>
                <p>Setor: <span id="nomeSetor"></span></p>
            </div>
    </div>

    </div>

<script src="javascript/projetoteste.js"></script>
</body>

</html>
