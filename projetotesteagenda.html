<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PonteDourada</title>
    <link rel="stylesheet" href="CSS/projetoteste.css">
    
</head>

<body>
    <div class="loginContainer">
        <header class="top-bar">
            <a href="javascript:void(0)" onclick="window.history.back();" class="btn-back">
                <img src="img/setaretorno.jpeg" alt="Voltar">
            </a>
            <span class="sector-info">🏠<BR> <strong>AGENDAMENTOS</strong></span>
        </header>
        <div class="logo"> <img src="img/2.jpeg" alt="">
        </div>
        <div class="configAgendaCliente">
            Cliente: <br><input type="text" id="agendaCliente" placeholder="Nome do cliente">
        </div>
        <div class="configAgendaProfissional">
            Profissional: <br><input type="text" id="agendaProfissional" placeholder="Nome do profissional">
        </div>
        <div class="configAgendaServico">
            Serviço: <br><input type="text" id="agendaervico" placeholder="Tipo de serviço">
        </div>
        <div class="configAgendadata">
            Data do Agendamento: <br><input type="date" id="agendaData">
        </div>
        <button type="submit" id="btnLogar " onclick="agendar()">CADASTRAR</button>
        <div id="btnCadastrar" style="display:none;">
            <h2 id="mensagemAgendaCadastro"></h2>
            <p>Setor: <span id="nomeSetor"></span></p>
        </div>
    </div>
    <script src="javascript/projetoteste.js"></script>
</body>

</html>
