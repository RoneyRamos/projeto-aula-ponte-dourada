<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PonteDourada</title>
    <link rel="stylesheet" href="CSS/projetoteste.css">
    
</head>

<body>
    <div class="loginContainer">
        <header class="top-bar">
            <header class="top-bar">
                <a href="javascript:void(0)" onclick="window.history.back();" class="btn-back">
                    <img src="img/setaretorno.jpeg" alt="Voltar">
                </a>
                <span class="sector-info">🏠<BR> <strong>CADASTRO FORNECEDORES</strong></span>
            </header>
            <div class="logo">
                <img src="img/2.jpeg" alt="">
            </div>
            <div class="configProduto">Razão Social : <br><input type="text" id="razaoSocial"
                    placeholder="Digite a Razão Social ...">
            </div><br>
            <div class="configCnpj">CNPJ : <br><input type="text" id="cnpj" placeholder="00.000.000/0000-00"
                    maxlength="18"></div><br>
            <div class="configFornecedor">Fornecedor : <br><input type="text" id="fornecedor"
                    placeholder="Nome Fantasia..."></div><br>
            <button type="submit" id="btnLogar" onclick="fornecedor()">CADASTRAR</button>
            <div id="btnCadastrar" style="display:none;">
                <h2 id="mensagemfornecedorCadastro"></h2>
                <p>Setor: <span id="nomeSetor"></span></p>
            </div>
    </div>

    </div>

<script src="javascript/projetoteste.js"></script>
</body>

</html>
